<div class="upload-container">
  <h2>Upload Video</h2>
  <div class="form-group">
    <label>Course ID</label>
    <input type="number" [ngModel]="courseId()" (ngModelChange)="courseId.set($event)" />
  </div>
  <div class="form-group">
    <label>Lesson ID</label>
    <input type="number" [ngModel]="lessonId()" (ngModelChange)="lessonId.set($event)" />
  </div>
  <div class="form-group">
    <label>Video file</label>
    <input type="file" (change)="onFileSelected($event)" accept="video/*" />
  </div>
  <button (click)="upload()" [disabled]="!selectedFile()">Upload</button>
  @if (uploadStatus()) {
    <p>{{ uploadStatus() }}</p>
  }
</div>
