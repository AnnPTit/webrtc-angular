<div class="rte">
  <!-- ── Sticky toolbar ── -->
  <div class="rte-toolbar">
    <div class="rte-group">
      <button type="button" class="rte-btn" title="Hoàn tác (Undo)"
        (mousedown)="$event.preventDefault()" (click)="undo()" aria-label="Undo">
        <svg viewBox="0 0 24 24" class="ic"><path d="M9 14 4 9l5-5"/><path d="M4 9h11a5 5 0 0 1 0 10h-3"/></svg>
      </button>
      <button type="button" class="rte-btn" title="Làm lại (Redo)"
        (mousedown)="$event.preventDefault()" (click)="redo()" aria-label="Redo">
        <svg viewBox="0 0 24 24" class="ic"><path d="m15 14 5-5-5-5"/><path d="M20 9H9a5 5 0 0 0 0 10h3"/></svg>
      </button>
    </div>

    <span class="rte-sep"></span>

    <div class="rte-group">
      <button type="button" class="rte-btn txt" title="Tiêu đề 1" [class.active]="currentBlock() === 'h1'"
        (mousedown)="$event.preventDefault()" (click)="setBlock('h1')">H1</button>
      <button type="button" class="rte-btn txt" title="Tiêu đề 2" [class.active]="currentBlock() === 'h2'"
        (mousedown)="$event.preventDefault()" (click)="setBlock('h2')">H2</button>
      <button type="button" class="rte-btn txt" title="Tiêu đề 3" [class.active]="currentBlock() === 'h3'"
        (mousedown)="$event.preventDefault()" (click)="setBlock('h3')">H3</button>
    </div>

    <span class="rte-sep"></span>

    <div class="rte-group">
      <button type="button" class="rte-btn txt bold" title="Đậm (Ctrl+B)" [class.active]="active()['bold']"
        (mousedown)="$event.preventDefault()" (click)="exec('bold')">B</button>
      <button type="button" class="rte-btn txt ital" title="Nghiêng (Ctrl+I)" [class.active]="active()['italic']"
        (mousedown)="$event.preventDefault()" (click)="exec('italic')">I</button>
      <button type="button" class="rte-btn txt undl" title="Gạch chân (Ctrl+U)" [class.active]="active()['underline']"
        (mousedown)="$event.preventDefault()" (click)="exec('underline')">U</button>
      <button type="button" class="rte-btn txt strk" title="Gạch ngang" [class.active]="active()['strikeThrough']"
        (mousedown)="$event.preventDefault()" (click)="exec('strikeThrough')">S</button>
    </div>

    <span class="rte-sep"></span>

    <div class="rte-group">
      <button type="button" class="rte-btn" title="Danh sách chấm" [class.active]="active()['insertUnorderedList']"
        (mousedown)="$event.preventDefault()" (click)="exec('insertUnorderedList')" aria-label="Bullet list">
        <svg viewBox="0 0 24 24" class="ic"><path d="M8 6h13M8 12h13M8 18h13"/><circle cx="3.5" cy="6" r="1.3" fill="currentColor" stroke="none"/><circle cx="3.5" cy="12" r="1.3" fill="currentColor" stroke="none"/><circle cx="3.5" cy="18" r="1.3" fill="currentColor" stroke="none"/></svg>
      </button>
      <button type="button" class="rte-btn" title="Danh sách số" [class.active]="active()['insertOrderedList']"
        (mousedown)="$event.preventDefault()" (click)="exec('insertOrderedList')" aria-label="Numbered list">
        <svg viewBox="0 0 24 24" class="ic"><path d="M10 6h11M10 12h11M10 18h11"/><path d="M4 4v4M3 8h2M3 12h2l-2 3h2" stroke-width="1.5"/></svg>
      </button>
      <button type="button" class="rte-btn" title="Trích dẫn" [class.active]="currentBlock() === 'blockquote'"
        (mousedown)="$event.preventDefault()" (click)="setBlock('blockquote')" aria-label="Blockquote">
        <svg viewBox="0 0 24 24" class="ic"><path d="M6 17h3l2-4V7H5v6h3zM16 17h3l2-4V7h-6v6h3z"/></svg>
      </button>
    </div>

    <span class="rte-sep"></span>

    <div class="rte-group">
      <button type="button" class="rte-btn" title="Chèn liên kết"
        (mousedown)="$event.preventDefault()" (click)="openLinkPopover()" aria-label="Link">
        <svg viewBox="0 0 24 24" class="ic"><path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1"/></svg>
      </button>
      <button type="button" class="rte-btn" title="Chèn khối mã"
        (mousedown)="$event.preventDefault()" (click)="openCodeModalForInsert()" aria-label="Code block">
        <svg viewBox="0 0 24 24" class="ic"><path d="m16 18 4-4-4-4M8 6 4 10l4 4"/><path d="m13 4-2 16" stroke-width="1.5"/></svg>
      </button>
      <button type="button" class="rte-btn" title="Đường phân cách"
        (mousedown)="$event.preventDefault()" (click)="insertDivider()" aria-label="Divider">
        <svg viewBox="0 0 24 24" class="ic"><path d="M3 12h18"/></svg>
      </button>
    </div>
  </div>

  <!-- ── Editing surface ── -->
  <div
    #surface
    class="rte-surface blog-prose"
    contenteditable="true"
    spellcheck="false"
    [attr.data-placeholder]="placeholder"
    (input)="onInput()"
    (click)="onSurfaceClick($event)"
    (paste)="onPaste($event)"
  ></div>

  <!-- ── Link popover ── -->
  @if (showLinkPopover()) {
    <div class="rte-overlay" (click)="cancelLink()">
      <div class="rte-dialog small" (click)="$event.stopPropagation()">
        <h3>Chèn liên kết</h3>
        <label class="fld">
          <span>Văn bản hiển thị</span>
          <input type="text" [ngModel]="linkText()" (ngModelChange)="linkText.set($event)"
            placeholder="(tùy chọn)" />
        </label>
        <label class="fld">
          <span>URL</span>
          <input type="url" [ngModel]="linkUrl()" (ngModelChange)="linkUrl.set($event)"
            placeholder="https://…" (keyup.enter)="applyLink()" />
        </label>
        <div class="rte-dialog-actions">
          <button type="button" class="btn-ghost" (click)="cancelLink()">Hủy</button>
          <button type="button" class="btn-primary" (click)="applyLink()">Chèn</button>
        </div>
      </div>
    </div>
  }

  <!-- ── Code-block modal ── -->
  @if (showCodeModal()) {
    <div class="rte-overlay" (click)="cancelCode()">
      <div class="rte-dialog" (click)="$event.stopPropagation()">
        <h3>Khối mã</h3>
        <label class="fld">
          <span>Ngôn ngữ</span>
          <select [ngModel]="codeLang()" (ngModelChange)="codeLang.set($event)">
            @for (l of languages; track l.value) {
              <option [value]="l.value">{{ l.label }}</option>
            }
          </select>
        </label>
        <label class="fld">
          <span>Mã nguồn</span>
          <textarea
            class="code-input"
            spellcheck="false"
            [value]="codeText()"
            (input)="onCodeTextInput($event)"
            (keydown)="onCodeTextKeydown($event)"
            placeholder="Dán hoặc gõ mã của bạn ở đây…"
            rows="12"
          ></textarea>
        </label>
        <div class="rte-dialog-actions">
          <button type="button" class="btn-ghost" (click)="cancelCode()">Hủy</button>
          <button type="button" class="btn-primary" (click)="applyCode()">
            {{ codeText().length ? 'Chèn khối mã' : 'Chèn' }}
          </button>
        </div>
      </div>
    </div>
  }
</div>
